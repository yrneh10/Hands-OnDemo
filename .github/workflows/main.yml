name: CI Pipeline with Security

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

  security_scan:
    name: Security Scan Stage
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk CLI Diagnostic
        run: |
          echo "Checking Snyk CLI Version..."
          snyk --version  

      - name: Authenticate Snyk
        run: |
          export SNYK_TOKEN=${{ secrets.SNYK_TOKEN }}
          snyk auth $SNYK_TOKEN --auth-type=token        

      - name: Run SAST / SCA scan
        run: snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy:
    name: Deploy Stage
    needs: security_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy application
        run: echo "Deploying application..."
